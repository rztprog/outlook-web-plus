<html>

        <meta charset="utf-8">

	<body>
		<main class="popup">
			<header class="popup-header">
				<img class="icon" src="../icons/mop96.png" title="Outlook Web Plus icon">
				<h1 class="titlePopup">Outlook Web Plus<sup>+</sup></h1>
				<a
					class="linkNewVersion"
					href="https://addons.mozilla.org/fr/firefox/addon/outlook-web-plus/"
					target="_blank"
					rel="noopener noreferrer">
					<span class="newVersion"></span>
				</a>
			</header>

			<div class="topButtons">
				<a class="primary-button" href="https://outlook.live.com/mail/0/" target="_blank" rel="noopener noreferrer" alt="Open Outlook Web">
					<span id="topButtonsOutlook_text">Open Outlook</span>
					<svg class="svgOutlook" width="1.8em" height="1.8em" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" transform="matrix(1, 0, 0, 1, 0, 0)"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 7L10.94 11.3375C11.5885 11.7428 12.4115 11.7428 13.06 11.3375L20 7M5 18H19C20.1046 18 21 17.1046 21 16V8C21 6.89543 20.1046 6 19 6H5C3.89543 6 3 6.89543 3 8V16C3 17.1046 3.89543 18 5 18Z" stroke="#ffffff" stroke-width="0.9600000000000002" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
				</a>

				<a class="primary-button" href="https://outlook.live.com/calendar/0/view/month" target="_blank" rel="noopener noreferrer" alt="Open Outlook Calendar Web">
					<span id="topButtonsCalendar_text">Open Calendar</span>
					<svg class="svgCalendar" width="1em" height="1em" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="font-size: 20px; vertical-align: text-bottom;" fill="currentcolor" aria-hidden="true"><path d="M14.5 3A2.5 2.5 0 0117 5.5v3.09a2 2 0 00-1 .23V7H4v7.5c0 .83.67 1.5 1.5 1.5h1.48a2 2 0 00.41.6l.4.4H5.5A2.5 2.5 0 013 14.5v-9A2.5 2.5 0 015.5 3h9zm0 1h-9C4.67 4 4 4.67 4 5.5V6h12v-.5c0-.83-.67-1.5-1.5-1.5zM8.1 15.9a1 1 0 010-1.42l1.06-1.06a1 1 0 011.41 0l1.07 1.06 4.6-4.6a1 1 0 011.4 0l1.07 1.06a1 1 0 010 1.42l-6.37 6.36a1 1 0 01-1.41 0L8.1 15.89zm2.47 1.05l1.07 1.06L18 11.65l-1.06-1.06-6.37 6.36zm-1.76-1.77l1.06 1.06 1.06-1.06-1.06-1.06-1.06 1.06z"></path></svg>
				</a>
			</div>

			<section class="settings-card">
				<h2 id="ads_title_text">Cleanup</h2>

				<label class="setting-row" title="Better performance with uBlock Origin">
					<span>
						<strong id="hide_firstemail_ad_text">Hide First Email Ad</strong>
						<small id="hide_firstemail_ad_desc">Hide the first ad in the mail list</small>
					</span>
					<input class="switch" type="checkbox" id="hidefirstemailadInput">
				</label>

				<label class="setting-row" title="Hide Microsoft 365 left navigation rail">
					<span>
						<strong id="hide_left_rail_text">Hide Left Rail</strong>
						<small id="hide_left_rail_desc">Hide the Microsoft 365 navigation rail</small>
					</span>
					<input class="switch" type="checkbox" id="hideleftbannerInput">
				</label>
			</section>

			<section class="settings-card">
				<h2 id="extras_title_text">Customization</h2>

				<label class="setting-row">
					<span>
						<strong id="email_counter_text">Email counter</strong>
						<small id="email_counter_desc">Show folder item count near the folder title</small>
					</span>
					<input class="switch" type="checkbox" id="addemailcalculatorInput">
				</label>

				<label class="setting-row" title="Set a custom email counter folder color">
					<span>
						<strong id="counter_color_text">Counter color</strong>
						<small id="counter_color_desc">Choose the email counter color (rgb, rgba, hexa, color name)</small>
					</span>
				</label>
				
				<div class="color-input-row">
					<input class="text-input" type="text" id="emailcalculatorcolorInput" title="rgb, rgba, hexa, color name" placeholder="green | #008000 | rgb(100,100,100)">
					<div id="emailcalculatorcolortypeInput" title="Color preview"></div>
				</div>

				<label class="setting-row" title="Delete folder title left padding">
					<span>
						<strong id="align_title_text">Align folder title</strong>
						<small id="align_title_desc" >Remove extra spacing near the title</small>
					</span>
					<input class="switch" type="checkbox" id="addaligntitlefolderInput">
				</label>

				<label class="setting-row" title="Add a custom background theme">
					<span>
						<strong id="custom_background_text">Background Theme URL</strong>
						<small id="custom_background_desc">Use a custom image for the top bar</small>
					</span>
					<input class="switch" type="checkbox" id="addcustomBackgroundInput">
				</label>

				<input class="text-input" type="text" id="customBackgroundInput" title="Image URL" placeholder="https://...">

				<label class="setting-row" title="Add transparency to topbar elements">
					<span>
						<strong id="transparency_topbar_text">Topbar transparency</strong>
						<small id="transparency_topbar_desc">Make top bar elements more transparent</small>
					</span>
					<input class="switch" type="checkbox" id="addtransparencytobarInput">
				</label>

				<label class="setting-row" title="Please rate and support if you like!">
					<span>
						<strong id="support_rate_topbar_text">Support and rating Button</strong>
						<small id="support_rate_topbar_desc">Show the rating button in Outlook</small>
					</span>
					<input class="switch" type="checkbox" id="addsupportandratebuttonInput">
				</label>
			</section>
